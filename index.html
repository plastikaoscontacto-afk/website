<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Web</title>

    <!-- Estilos CSS -->
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }

        nav {
            background: #555;
            padding: 0.5rem;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Encabezado -->
    <header>
        <h1>Mi Proyecto en GitHub</h1>
        <p>Bienvenido a mi página web</p>
    </header>

    <!-- Navegación -->
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Productos</a>
        <a href="#">Contacto</a>
    </nav>

    <!-- Contenido principal -->
    <div class="container">
        <div class="card">
            <h2>Sección 1</h2>
            <p>Aquí puedes poner información de tu proyecto.</p>
        </div>

        <div class="card">
            <h2>Sección 2</h2>
            <p>Puedes agregar más contenido aquí.</p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Mi Página | Hecho con GitHub Pages</p>
    </footer>

</body>
</html>
