<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda estilo MercadoLibre PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#ebebeb}

/* HEADER tipo MercadoLibre */
header{display:flex;align-items:center;gap:10px;padding:10px;background:#ffe600}
.logo{font-weight:bold}
.search input{padding:10px;border-radius:5px;border:none;width:100%}

/* Grid */
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:15px}

/* Card estilo MercadoLibre */
.card{background:white;border-radius:8px;padding:10px;text-align:left;transition:.2s}
.card:hover{box-shadow:0 4px 10px rgba(0,0,0,.15)}
.card img{width:100%;border-radius:5px}
.price{font-size:20px;font-weight:bold}
.shipping{color:green;font-size:13px}

.btn{background:#3483fa;color:white;border:none;padding:8px;border-radius:5px;cursor:pointer;width:100%;margin-top:5px}

/* Badge */
.badge{background:green;color:white;font-size:10px;padding:3px;border-radius:5px}

/* Carrito */
.cart{position:fixed;right:-320px;top:0;width:300px;height:100%;background:white;padding:15px;transition:.3s}
.cart.active{right:0}

/* Producto */
.product-page{display:none;padding:20px;background:white}
.zoom:hover{transform:scale(1.1)}
</style>
</head>

<body>

<header>
<div class="logo">🛒 Tienda</div>
<div class="search"><input type="text" placeholder="Buscar productos..." onkeyup="searchProduct(this.value)"></div>
<button onclick="toggleCart()">🛒</button>
</header>

<section class="products" id="products"></section>

<div class="cart" id="cart">
<h3>Carrito</h3>
<div id="cart-items"></div>
</div>

<div class="product-page" id="product-page">
<button onclick="goBack()">← Volver</button>
<img id="p-main" class="zoom" width="300">
<h2 id="p-name"></h2>
<p id="p-price"></p>
<p class="shipping">Envío gratis 🚚</p>
<p id="p-desc"></p>
<div id="rating"></div>
<button class="btn" id="buy-btn">Comprar ahora</button>
</div>

<script>

const products=[
{id:1,name:"Audífonos",price:500,desc:"Alta calidad",rating:4,images:["https://picsum.photos/400?1"],link:"LINK DE PAGO AQUI"},
{id:2,name:"Smartwatch",price:1200,desc:"Tecnología",rating:5,images:["https://picsum.photos/400?2"],link:"LINK DE PAGO AQUI"}
];

let cart=[];

function render(list){
const c=document.getElementById("products");
c.innerHTML="";

list.forEach(p=>{
c.innerHTML+=`
<div class="card">
<img src="${p.images[0]}">
<p class="price">$${p.price}</p>
<p>${p.name}</p>
<p class="shipping">Envío gratis</p>
<p>${"⭐".repeat(p.rating)}</p>
<button class="btn" onclick="viewProduct(${p.id})">Ver producto</button>
<button class="btn" onclick="add(${p.id})">Agregar al carrito</button>
</div>`;
});
}

render(products);

function searchProduct(text){
render(products.filter(p=>p.name.toLowerCase().includes(text.toLowerCase())));
}

function viewProduct(id){
const p=products.find(x=>x.id===id);
document.getElementById("products").style.display="none";
document.getElementById("product-page").style.display="block";

document.getElementById("p-main").src=p.images[0];
document.getElementById("p-name").textContent=p.name;
document.getElementById("p-price").textContent="$"+p.price;
document.getElementById("p-desc").textContent=p.desc;
document.getElementById("rating").textContent="⭐".repeat(p.rating);
document.getElementById("buy-btn").onclick=()=>window.open(p.link);
}

function goBack(){
document.getElementById("product-page").style.display="none";
document.getElementById("products").style.display="grid";
}

function add(id){
cart.push(products.find(p=>p.id===id));
renderCart();
}

function renderCart(){
const c=document.getElementById("cart-items");
c.innerHTML="";
cart.forEach(i=>{
c.innerHTML+=`<p>${i.name} - $${i.price}</p>`;
});
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

</script>

</body>
</html>
