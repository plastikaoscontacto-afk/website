<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda Moderna</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --gray: #666;
      --primary: #0071e3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: white;
      z-index: 1000;
    }

    header h1 {
      font-size: 18px;
      margin: 0;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
    }

    .cart-btn {
      cursor: pointer;
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 20px;
    }

    /* Carrusel */
    .carousel {
      position: relative;
      overflow: hidden;
      height: 60vh;
    }

    .slides {
      display: flex;
      transition: transform 0.5s ease;
    }

    .slide {
      min-width: 100%;
      height: 60vh;
      background-size: cover;
      background-position: center;
    }

    /* Productos */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      border: 1px solid #eee;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    .card h3 { margin: 10px 0 5px; }

    .card p { color: var(--gray); }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 20px;
      cursor: pointer;
    }

    /* Carrito */
    .cart {
      position: fixed;
      right: -400px;
      top: 0;
      width: 300px;
      height: 100%;
      background: white;
      box-shadow: -5px 0 20px rgba(0,0,0,0.1);
      padding: 20px;
      transition: 0.3s;
      z-index: 2000;
    }

    .cart.active { right: 0; }

    .cart h2 { margin-top: 0; }

    footer {
      text-align: center;
      padding: 20px;
      color: var(--gray);
    }
  </style>
</head>
<body>

<header>
  <h1>Mi Tienda</h1>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Productos</a>
  </nav>
  <button class="cart-btn" onclick="toggleCart()">🛒 (<span id="cart-count">0</span>)</button>
</header>

<!-- Carrusel -->
<div class="carousel">
  <div class="slides" id="slides">
    <div class="slide" style="background-image: url('https://picsum.photos/1200/600?1');"></div>
    <div class="slide" style="background-image: url('https://picsum.photos/1200/600?2');"></div>
    <div class="slide" style="background-image: url('https://picsum.photos/1200/600?3');"></div>
  </div>
</div>

<!-- Productos -->
<section class="products" id="products">
</section>

<!-- Carrito -->
<div class="cart" id="cart">
  <h2>Carrito</h2>
  <ul id="cart-items"></ul>
</div>

<footer>
  <p>© 2026 Tienda Moderna</p>
</footer>

<script>
  // Productos base
  const products = [
    { id: 1, name: "Producto 1", price: 100, img: "https://picsum.photos/300?1" },
    { id: 2, name: "Producto 2", price: 200, img: "https://picsum.photos/300?2" },
    { id: 3, name: "Producto 3", price: 300, img: "https://picsum.photos/300?3" }
  ];

  const cart = [];

  const productContainer = document.getElementById("products");
  const cartItems = document.getElementById("cart-items");
  const cartCount = document.getElementById("cart-count");

  // Render productos
  products.forEach(p => {
    productContainer.innerHTML += `
      <div class="card">
        <img src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button class="btn" onclick="addToCart(${p.id})">Agregar</button>
      </div>
    `;
  });

  function addToCart(id) {
    const product = products.find(p => p.id === id);
    cart.push(product);
    updateCart();
  }

  function updateCart() {
    cartItems.innerHTML = "";
    cart.forEach(item => {
      cartItems.innerHTML += `<li>${item.name} - $${item.price}</li>`;
    });
    cartCount.textContent = cart.length;
  }

  function toggleCart() {
    document.getElementById("cart").classList.toggle("active");
  }

  // Carrusel automático
  let index = 0;
  const slides = document.getElementById("slides");

  setInterval(() => {
    index = (index + 1) % 3;
    slides.style.transform = `translateX(-${index * 100}%)`;
  }, 5000);
</script>

</body>
</html>
