<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda PRO avanzada</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f5f5f5}
header{display:flex;align-items:center;gap:10px;padding:15px;background:white}
.search input{padding:10px;border-radius:20px;border:1px solid #ccc;width:100%}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px}
.card{background:white;border-radius:15px;padding:15px;text-align:center;transition:.3s}
.card:hover{transform:scale(1.03)}
.btn{background:#0071e3;color:#fff;border:none;padding:10px;border-radius:20px;cursor:pointer;margin-top:5px;width:100%}
.favorite{cursor:pointer;font-size:20px}
.cart{position:fixed;right:-350px;top:0;width:300px;height:100%;background:white;padding:20px;transition:.3s}
.cart.active{right:0}
.product-page{display:none;padding:20px}
.zoom:hover{transform:scale(1.2);transition:.3s}
</style>
</head>
<body>

<header>
<h2>Tienda PRO</h2>
<div class="search"><input type="text" placeholder="Buscar..." onkeyup="searchProduct(this.value)"></div>
<button onclick="toggleCart()">🛒</button>
</header>

<section class="products" id="products"></section>

<div class="cart" id="cart">
<h3>Carrito</h3>
<div id="cart-items"></div>
</div>

<div class="product-page" id="product-page">
<button onclick="goBack()">← Volver</button>
<img id="p-main" class="zoom" width="300">
<h2 id="p-name"></h2>
<p id="p-price"></p>
<p id="p-desc"></p>
<div id="rating"></div>
<button class="btn" id="buy-btn">Comprar</button>
</div>

<script>
const products=[
{id:1,name:"Audífonos",price:500,desc:"Alta calidad",rating:4,images:["https://picsum.photos/400?1"],link:"LINK DE PAGO AQUI"},
{id:2,name:"Smartwatch",price:1200,desc:"Tecnología",rating:5,images:["https://picsum.photos/400?2"],link:"LINK DE PAGO AQUI"}
];

let cart=[];
let favorites=[];

function render(list){
const c=document.getElementById("products");
c.innerHTML="";
list.forEach(p=>{
c.innerHTML+=`
<div class="card">
<div class="favorite" onclick="toggleFav(${p.id})">❤️</div>
<img src="${p.images[0]}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<p>${"⭐".repeat(p.rating)}</p>
<button class="btn" onclick="viewProduct(${p.id})">Ver</button>
<button class="btn" onclick="add(${p.id})">Agregar</button>
</div>`;
});
}

render(products);

function toggleFav(id){
if(favorites.includes(id)){
favorites=favorites.filter(f=>f!==id);
}else{favorites.push(id)}
alert("Favoritos: "+favorites.length);
}

function searchProduct(text){
render(products.filter(p=>p.name.toLowerCase().includes(text.toLowerCase())));
}

function viewProduct(id){
const p=products.find(x=>x.id===id);
document.getElementById("products").style.display="none";
document.getElementById("product-page").style.display="block";

pMain=document.getElementById("p-main");
pMain.src=p.images[0];
document.getElementById("p-name").textContent=p.name;
document.getElementById("p-price").textContent="$"+p.price;
document.getElementById("p-desc").textContent=p.desc;
document.getElementById("rating").textContent="⭐".repeat(p.rating);
document.getElementById("buy-btn").onclick=()=>window.open(p.link);
}

function goBack(){
document.getElementById("product-page").style.display="none";
document.getElementById("products").style.display="grid";
}

function add(id){
cart.push(products.find(p=>p.id===id));
renderCart();
}

function renderCart(){
const c=document.getElementById("cart-items");
c.innerHTML="";
cart.forEach(i=>{
c.innerHTML+=`<p>${i.name} - $${i.price}</p>`;
});
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}
</script>

</body>
</html>
