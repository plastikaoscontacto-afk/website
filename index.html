<!DOCTYPE html> <!-- Define HTML5 -->
<html lang="es"> <!-- Idioma español -->
<head>
<meta charset="UTF-8"> <!-- Codificación -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive -->
<title>Tienda PRO avanzada</title> <!-- Título -->

<!-- Fuente moderna -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* Estilos generales */
body{margin:0;font-family:'Inter',sans-serif;background:#f5f5f5} /* Fondo gris claro */

/* Header */
header{display:flex;align-items:center;gap:10px;padding:15px;background:white} /* Barra superior */

/* Buscador */
.search input{padding:10px;border-radius:20px;border:1px solid #ccc;width:100%} /* Input */

/* Grid productos */
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px}

/* Tarjeta producto */
.card{background:white;border-radius:15px;padding:15px;text-align:center;transition:.3s}
.card:hover{transform:scale(1.03)} /* Animación hover */

/* Botones */
.btn{background:#0071e3;color:#fff;border:none;padding:10px;border-radius:20px;cursor:pointer;margin-top:5px;width:100%}

/* Favoritos */
.favorite{cursor:pointer;font-size:20px} /* Corazón */

/* Carrito oculto */
.cart{position:fixed;right:-350px;top:0;width:300px;height:100%;background:white;padding:20px;transition:.3s}
.cart.active{right:0} /* Mostrar carrito */

/* Página producto */
.product-page{display:none;padding:20px} /* Oculta inicialmente */

/* Zoom imagen */
.zoom:hover{transform:scale(1.2);transition:.3s}
</style>
</head>

<body>

<!-- Header -->
<header>
<h2>Tienda PRO</h2> <!-- Nombre -->
<div class="search">
<input type="text" placeholder="Buscar..." onkeyup="searchProduct(this.value)"> <!-- Buscador -->
</div>
<button onclick="toggleCart()">🛒</button> <!-- Botón carrito -->
</header>

<!-- Contenedor productos -->
<section class="products" id="products"></section>

<!-- Carrito -->
<div class="cart" id="cart">
<h3>Carrito</h3>
<div id="cart-items"></div> <!-- Lista productos -->
</div>

<!-- Página individual producto -->
<div class="product-page" id="product-page">
<button onclick="goBack()">← Volver</button> <!-- Regresar -->
<img id="p-main" class="zoom" width="300"> <!-- Imagen principal -->
<h2 id="p-name"></h2> <!-- Nombre -->
<p id="p-price"></p> <!-- Precio -->
<p id="p-desc"></p> <!-- Descripción -->
<div id="rating"></div> <!-- Estrellas -->
<button class="btn" id="buy-btn">Comprar</button> <!-- Compra -->
</div>

<script>

// Lista de productos
const products=[
{id:1,name:"Audífonos",price:500,desc:"Alta calidad",rating:4,images:["https://picsum.photos/400?1"],link:"LINK DE PAGO AQUI"},
{id:2,name:"Smartwatch",price:1200,desc:"Tecnología",rating:5,images:["https://picsum.photos/400?2"],link:"LINK DE PAGO AQUI"}
];

let cart=[]; // Carrito
let favorites=[]; // Favoritos

// Renderiza productos
function render(list){
const c=document.getElementById("products"); // Contenedor
c.innerHTML=""; // Limpia

list.forEach(p=>{
// Inserta HTML dinámico
c.innerHTML+=`
<div class="card">
<div class="favorite" onclick="toggleFav(${p.id})">❤️</div> <!-- Favorito -->
<img src="${p.images[0]}"> <!-- Imagen -->
<h3>${p.name}</h3> <!-- Nombre -->
<p>$${p.price}</p> <!-- Precio -->
<p>${"⭐".repeat(p.rating)}</p> <!-- Rating -->
<button class="btn" onclick="viewProduct(${p.id})">Ver</button> <!-- Ver -->
<button class="btn" onclick="add(${p.id})">Agregar</button> <!-- Carrito -->
</div>`;
});
}

render(products); // Inicializa

// Favoritos
function toggleFav(id){
if(favorites.includes(id)){
favorites=favorites.filter(f=>f!==id); // Quita
}else{favorites.push(id)} // Agrega
alert("Favoritos: "+favorites.length);
}

// Buscador
function searchProduct(text){
render(products.filter(p=>p.name.toLowerCase().includes(text.toLowerCase())));
}

// Ver producto
function viewProduct(id){
const p=products.find(x=>x.id===id);
document.getElementById("products").style.display="none"; // Oculta catálogo
document.getElementById("product-page").style.display="block"; // Muestra producto

pMain=document.getElementById("p-main");
pMain.src=p.images[0]; // Imagen

document.getElementById("p-name").textContent=p.name;
document.getElementById("p-price").textContent="$"+p.price;
document.getElementById("p-desc").textContent=p.desc;
document.getElementById("rating").textContent="⭐".repeat(p.rating);

document.getElementById("buy-btn").onclick=()=>window.open(p.link); // Pago
}

// Regresar catálogo
function goBack(){
document.getElementById("product-page").style.display="none";
document.getElementById("products").style.display="grid";
}

// Agregar carrito
function add(id){
cart.push(products.find(p=>p.id===id));
renderCart();
}

// Render carrito
function renderCart(){
const c=document.getElementById("cart-items");
c.innerHTML="";

cart.forEach(i=>{
c.innerHTML+=`<p>${i.name} - $${i.price}</p>`;
});
}

// Mostrar/ocultar carrito
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

</script>

</body>
</html>
