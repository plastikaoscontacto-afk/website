<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda PRO</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0071e3;
      --bg: #fff;
      --text: #111;
      --gray: #666;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: white;
      z-index: 1000;
    }

    .cart-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
    }

    .carousel { height: 60vh; overflow: hidden; }
    .slides { display: flex; transition: 0.5s; }
    .slide { min-width: 100%; background-size: cover; background-position: center; }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      border: 1px solid #eee;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover { transform: scale(1.03); }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 10px;
    }

    .cart {
      position: fixed;
      right: -400px;
      top: 0;
      width: 350px;
      height: 100%;
      background: white;
      box-shadow: -5px 0 20px rgba(0,0,0,0.1);
      padding: 20px;
      transition: 0.3s;
    }

    .cart.active { right: 0; }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    .total {
      font-weight: bold;
      margin-top: 20px;
    }

    .checkout {
      width: 100%;
      margin-top: 10px;
    }

    footer { text-align: center; padding: 20px; color: var(--gray); }
  </style>
</head>
<body>

<header>
  <h2>Mi Tienda PRO</h2>
  <button class="cart-btn" onclick="toggleCart()">🛒 (<span id="count">0</span>)</button>
</header>

<div class="carousel">
  <div class="slides" id="slides">
    <div class="slide" style="background-image:url('https://picsum.photos/1200/600?1')"></div>
    <div class="slide" style="background-image:url('https://picsum.photos/1200/600?2')"></div>
    <div class="slide" style="background-image:url('https://picsum.photos/1200/600?3')"></div>
  </div>
</div>

<section class="products" id="products"></section>

<div class="cart" id="cart">
  <h2>Carrito</h2>
  <div id="cart-items"></div>
  <div class="total">Total: $<span id="total">0</span></div>
  <button class="btn checkout" onclick="checkout()">Pagar</button>
</div>

<footer>© 2026 Tienda PRO</footer>

<script>
const products = [
  {id:1,name:"Audífonos",price:500,img:"https://picsum.photos/300?1"},
  {id:2,name:"Smartwatch",price:1200,img:"https://picsum.photos/300?2"},
  {id:3,name:"Laptop",price:15000,img:"https://picsum.photos/300?3"}
];

let cart = [];

const container = document.getElementById("products");
const cartItems = document.getElementById("cart-items");
const totalEl = document.getElementById("total");
const countEl = document.getElementById("count");

products.forEach(p=>{
  container.innerHTML += `
  <div class="card">
    <img src="${p.img}" width="100%">
    <h3>${p.name}</h3>
    <p>$${p.price}</p>
    <button class="btn" onclick="add(${p.id})">Agregar</button>
  </div>`;
});

function add(id){
  const product = products.find(p=>p.id===id);
  cart.push(product);
  renderCart();
}

function remove(index){
  cart.splice(index,1);
  renderCart();
}

function renderCart(){
  cartItems.innerHTML="";
  let total=0;

  cart.forEach((item,i)=>{
    total+=item.price;
    cartItems.innerHTML += `
      <div class="cart-item">
        ${item.name} - $${item.price}
        <button onclick="remove(${i})">❌</button>
      </div>`;
  });

  totalEl.textContent=total;
  countEl.textContent=cart.length;
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function checkout(){
  alert("Pago simulado 💳\nTotal: $"+totalEl.textContent);
}

let i=0;
setInterval(()=>{
  i=(i+1)%3;
  document.getElementById("slides").style.transform=`translateX(-${i*100}%)`;
},5000);
</script>

</body>
</html>
